<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23433196'/%3E%3Ctext x='28' y='48' text-anchor='middle' fill='white' font-family='system-ui' font-weight='900' font-size='46' letter-spacing='-3'%3EA%3C/text%3E%3Ccircle cx='52' cy='16' r='6' fill='white' opacity='0.85'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#FAFBFF;--bg-dark:#0B1B3D;--border:#E8ECF2;--border-hover:rgba(79,70,229,.18);--text:#0B1B3D;--text-mid:#374151;--text-muted:#64748B;--text-dim:#94A3B8;--indigo:#4F46E5;--indigo-dark:#4338CA;--green:#10B981;--mono:'JetBrains Mono',monospace;--sans:'Inter',-apple-system,sans-serif;--display:'Plus Jakarta Sans',sans-serif;--radius:14px;--max-w:1120px}
        html{scroll-behavior:smooth}
        body{font-family:var(--sans);font-size:17px;background:#fff;color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden;line-height:1.7}
        body::before{content:'';position:fixed;inset:0;z-index:-1;background-image:linear-gradient(rgba(79,70,229,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(79,70,229,.03) 1px,transparent 1px);background-size:64px 64px;pointer-events:none}
        h1,h2,h3{font-family:var(--display);line-height:1.15;letter-spacing:-.04em}
        @keyframes orb1{0%{transform:translate(0,0) scale(1)}33%{transform:translate(120px,-80px) scale(1.15)}66%{transform:translate(-60px,100px) scale(.9)}100%{transform:translate(0,0) scale(1)}}
        @keyframes orb2{0%{transform:translate(0,0) scale(1)}33%{transform:translate(-140px,60px) scale(1.1)}66%{transform:translate(100px,-120px) scale(1.15)}100%{transform:translate(0,0) scale(1)}}
        @keyframes pulse{0%,100%{transform:scale(1);opacity:.65}50%{transform:scale(1.25);opacity:.85}}
        @keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(16,185,129,.3)}70%{box-shadow:0 0 0 8px rgba(16,185,129,0)}100%{box-shadow:0 0 0 0 rgba(16,185,129,0)}}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
        @keyframes waveform{0%{height:4px}50%{height:var(--h)}100%{height:4px}}

        .nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
        .nav-inner{max-width:var(--max-w);margin:0 auto;padding:0 32px;display:flex;align-items:center;height:64px}
        .logo{display:inline-flex;align-items:baseline;text-decoration:none;margin-right:auto;font-family:var(--display);font-size:18px;font-weight:900;letter-spacing:-.04em;color:var(--text)}
        .dot-circle{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--indigo);margin-left:1px;vertical-align:super}
        .logo-tagline{font-size:11px;color:var(--text-muted);font-weight:400;margin-left:14px;padding-left:14px;border-left:1px solid var(--border);white-space:nowrap}
        .nav-links{display:flex;gap:20px;margin-right:20px}
        .nav-links a{color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:500;transition:color .2s}
        .nav-links a:hover{color:var(--text)}
        .nav-right{display:flex;align-items:center;gap:10px}
        .nav-cta{padding:14px 28px;background:var(--indigo);color:#fff;border:none;border-radius:12px;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s}
        .nav-cta:hover{background:var(--indigo-dark)}
        .nav-cta-ghost{padding:14px 28px;background:transparent;color:var(--text-mid);border:1px solid var(--border);border-radius:12px;font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;text-decoration:none;transition:all .2s}

        .hero{min-height:100vh;padding:112px 32px 64px;text-align:center;position:relative;background:#fff;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center}
        .hero h1{font-size:clamp(42px,5.5vw,72px);font-weight:900;letter-spacing:-.05em;line-height:1.0;margin-bottom:16px;max-width:900px;position:relative;z-index:1}
        .hero-sub{font-size:18px;color:var(--text-muted);margin-bottom:24px;position:relative;z-index:1}
        .hero-canvas{position:absolute;bottom:-80px;left:50%;transform:translateX(-50%);width:1100px;height:580px;pointer-events:none;z-index:0}
        .hero-canvas .orb{position:absolute;border-radius:50%;filter:blur(48px);animation-timing-function:ease-in-out;animation-iteration-count:infinite;mix-blend-mode:multiply}
        .hero-canvas .o1{width:520px;height:320px;bottom:-40px;left:50%;margin-left:-380px;border-radius:45%;background:radial-gradient(ellipse,rgba(79,70,229,.75) 0%,rgba(99,102,241,.35) 50%,transparent 75%);animation:orb1 5s ease-in-out infinite}
        .hero-canvas .o2{width:480px;height:280px;bottom:0;left:50%;margin-left:80px;border-radius:45%;background:radial-gradient(ellipse,rgba(16,185,129,.7) 0%,rgba(5,150,105,.35) 50%,transparent 75%);animation:orb2 6s ease-in-out infinite}
        .hero-canvas .o3{width:400px;height:250px;bottom:60px;left:50%;margin-left:-120px;border-radius:45%;background:radial-gradient(ellipse,rgba(139,92,246,.65) 0%,rgba(167,139,250,.3) 50%,transparent 75%);animation:pulse 4s ease-in-out infinite}
        .hero-canvas::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,transparent 15%,#fff 60%);pointer-events:none}

        .call-card{position:relative;z-index:1;max-width:520px;width:100%;background:var(--bg-dark);border-radius:16px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.15);margin-bottom:32px}
        .call-header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
        .call-live{display:flex;align-items:center;gap:8px}
        .call-live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse-ring 2s infinite}
        .call-live span{font-size:12px;color:var(--green);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
        .call-to{margin-left:auto;font-size:13px;color:rgba(255,255,255,.5);font-family:var(--mono)}
        .waveform{display:flex;align-items:center;gap:3px;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,.06)}
        .waveform span{display:block;width:3px;border-radius:2px;background:var(--indigo);animation:waveform 1.2s ease-in-out infinite}
        .transcript{padding:20px;min-height:220px;position:relative}
        .transcript-line{margin-bottom:14px;opacity:0;transform:translateY(8px);transition:opacity .4s,transform .4s}
        .transcript-line.visible{opacity:1;transform:translateY(0)}
        .transcript-line .speaker{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
        .transcript-line .speaker.agent{color:var(--indigo)}
        .transcript-line .speaker.debtor{color:rgba(255,255,255,.4)}
        .transcript-line .text{font-size:14px;line-height:1.6;color:rgba(255,255,255,.85)}
        .transcript-line .text.debtor-text{color:rgba(255,255,255,.5);font-style:italic}
        .transcript-line .cursor{display:inline-block;width:2px;height:14px;background:var(--indigo);animation:blink 1s infinite;vertical-align:text-bottom}
        .transcript-blur{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,var(--bg-dark));z-index:1}

        .hero-trust{display:flex;align-items:center;justify-content:center;gap:28px;margin:0 auto 24px;position:relative;z-index:1}
        .hero-trust-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim)}
        .hero-trust img{height:20px;opacity:.55;filter:grayscale(100%);object-fit:contain;max-width:100px}

        .hero-input-wrap{max-width:480px;width:100%;position:relative;z-index:1}
        .hero-input-label{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:10px}
        .input-box{display:flex;align-items:center;background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:4px;transition:all .25s}
        .input-box:focus-within{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(79,70,229,.06)}
        .input-field{flex:1;padding:14px 18px;background:transparent;border:none;font-family:var(--sans);font-size:16px;color:var(--text);outline:none}
        .input-field::placeholder{color:var(--text-muted)}
        .input-btn{padding:14px 28px;background:var(--indigo);color:#fff;border:none;border-radius:12px;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap}
        .input-btn:hover{background:var(--indigo-dark)}

        footer{text-align:center;padding:48px 32px;color:var(--text-muted);font-size:13px;border-top:1px solid var(--border)}
        @media(max-width:768px){.nav-links,.nav-right .nav-cta-ghost,.logo-tagline{display:none}.call-card{max-width:100%}}
    </style>

</head>
<body>
<nav class="nav"><div class="nav-inner">
    <a href="/" class="logo">Agent<span>Collect</span><span class="dot-circle"></span></a>
    <span class="logo-tagline">The end of manual collection.</span>
    <div class="nav-links"><a href="/ai-collection">AI Collection</a><a href="/attorney-collection">Attorney Collection</a><a href="/pricing">Pricing</a><a href="/security">Security</a></div>
    <div class="nav-right"><a href="https://cal.com/johnb/30" class="nav-cta-ghost" target="_blank">Talk to us</a><a href="#hero-input" class="nav-cta">See your collection plan</a></div>
</div></nav>

<section class="hero">
    <div class="hero-canvas" aria-hidden="true"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
    <h1>The end of manual collection.</h1>
    <p class="hero-sub">They think they're talking to you.</p>

    <div class="call-card">
        <div class="call-header">
            <div class="call-live"><span class="call-live-dot"></span><span>Live</span></div>
            <span class="call-to">mario@luigispizza.com</span>
        </div>
        <div class="waveform" id="waveform"></div>
        <div class="transcript" id="transcript"></div>
    </div>

    <div class="hero-trust">
        <span class="hero-trust-label">Trusted by</span>
        <img src="https://cdn.brandfetch.io/microsoft.com/w/512/h/80/logo" alt="Microsoft">
        <img src="https://cdn.brandfetch.io/dell.com/w/512/h/80/logo" alt="Dell">
        <img src="https://cdn.brandfetch.io/plaid.com/w/512/h/80/logo" alt="Plaid">
    </div>

    <div class="hero-input-wrap" id="hero-input">
        <div class="hero-input-label">50% recovered in 20 days &mdash; see your agent</div>
        <div class="input-box"><input type="text" class="input-field" placeholder="uber.com"><button class="input-btn">Build my agent</button></div>
    </div>
</section>

<footer>AgentCollect &copy; 2026</footer>

<script>
// Waveform bars
const wf=document.getElementById('waveform');
for(let i=0;i<32;i++){const s=document.createElement('span');s.style.setProperty('--h',(Math.random()*16+4)+'px');s.style.animationDelay=(Math.random()*1.2)+'s';wf.appendChild(s)}

// Transcript typewriter
const lines=[
    {speaker:'agent',name:'Agent',text:`"Hi Mario, this is David from Uber. I see you opened our email about the $4,200 balance but didn't complete the payment."`},
    {speaker:'debtor',name:'Mario',text:`"Yeah... cash is tight right now."`},
    {speaker:'agent',name:'Agent',text:`"Totally understand. I've set up $1,400/month \u2014 you stay active on the platform."`},
    {speaker:'debtor',name:'Mario',text:`"That works. Send me the link."`}
];
const container=document.getElementById('transcript');
let lineIdx=0;

function showLine(){
    if(lineIdx>=lines.length){
        // Add blur overlay
        const blur=document.createElement('div');blur.className='transcript-blur';container.appendChild(blur);
        return;
    }
    const l=lines[lineIdx];
    const div=document.createElement('div');div.className='transcript-line';
    const sp=document.createElement('div');sp.className='speaker '+(l.speaker==='agent'?'agent':'debtor');sp.textContent=l.name;
    const tx=document.createElement('div');tx.className='text'+(l.speaker==='debtor'?' debtor-text':'');
    div.appendChild(sp);div.appendChild(tx);container.appendChild(div);
    requestAnimationFrame(()=>div.classList.add('visible'));

    let ci=0;const cur=document.createElement('span');cur.className='cursor';tx.appendChild(cur);
    const interval=setInterval(()=>{
        if(ci<l.text.length){tx.insertBefore(document.createTextNode(l.text[ci]),cur);ci++}
        else{clearInterval(interval);cur.remove();lineIdx++;setTimeout(showLine,600)}
    },28);
}
setTimeout(showLine,800);
</script>
</body>
