<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentCollect — Hear What AI Collection Sounds Like</title>
    <meta name="description" content="Real AI collection calls. Real payments collected by an AI agent they thought was human.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23433196'/%3E%3Ctext x='28' y='48' text-anchor='middle' fill='white' font-family='system-ui' font-weight='900' font-size='46' letter-spacing='-3'%3EA%3C/text%3E%3Ccircle cx='52' cy='16' r='6' fill='white' opacity='0.85'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#08080a;
            --text:#f5f5f7;--text-mid:rgba(255,255,255,.65);--text-muted:rgba(255,255,255,.35);--text-dim:rgba(255,255,255,.12);
            --indigo:#818cf8;--indigo-bright:#c7d2fe;--indigo-glow:rgba(129,140,248,.08);--indigo-deep:#4f46e5;
            --green:#34d399;--green-soft:rgba(52,211,153,.08);
            --border:rgba(255,255,255,.05);
            --mono:'JetBrains Mono',monospace;--sans:'Inter',-apple-system,sans-serif;--display:'Plus Jakarta Sans',sans-serif;
        }
        html,body{height:100%;overflow:hidden}
        body{font-family:var(--sans);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
        ::selection{background:rgba(129,140,248,.15)}

        /* ═══ AMBIENT ═══ */
        .ambient{position:fixed;inset:0;z-index:0;pointer-events:none}
        .orb{position:absolute;border-radius:50%;filter:blur(150px);will-change:transform}
        .orb.a{width:800px;height:800px;background:rgba(79,70,229,.14);top:-350px;left:-300px;animation:fa 22s ease-in-out infinite}
        .orb.b{width:600px;height:600px;background:rgba(124,58,237,.1);bottom:-300px;right:-250px;animation:fb 28s ease-in-out infinite}
        @keyframes fa{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,40px)}}
        @keyframes fb{0%,100%{transform:translate(0,0)}50%{transform:translate(-50px,-30px)}}
        .noise{position:fixed;inset:0;z-index:1;opacity:.02;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

        /* ═══ STAGE ═══ */
        .stage{position:relative;z-index:2;width:100%;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px}

        /* ═══ GIANT TYPO ═══ */
        .typo-bg{position:absolute;z-index:1;width:100%;text-align:center;top:50%;transform:translateY(-50%);pointer-events:none;user-select:none;padding:0 20px}
        .typo-bg h1{font-family:var(--display);font-size:clamp(80px,14vw,200px);font-weight:900;letter-spacing:-.07em;line-height:.85;
            color:transparent;-webkit-text-stroke:1px rgba(255,255,255,.04);
            opacity:0;animation:typo-in 1.5s .1s cubic-bezier(.16,1,.3,1) forwards}
        @keyframes typo-in{0%{opacity:0;transform:scale(.95) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}

        /* ═══ PLAYER ═══ */
        .card-wrap{position:relative;z-index:5;width:100%;max-width:520px;opacity:0;animation:card-in 1s .3s cubic-bezier(.16,1,.3,1) forwards}
        @keyframes card-in{0%{opacity:0;transform:translateY(30px)}100%{opacity:1;transform:translateY(0)}}

        .card{background:rgba(12,12,16,.8);backdrop-filter:blur(60px) saturate(1.5);-webkit-backdrop-filter:blur(60px) saturate(1.5);
            border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:24px 28px 20px;position:relative;
            box-shadow:0 24px 80px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.02) inset}
        .card::before{content:'';position:absolute;top:-1px;left:15%;right:15%;height:1px;
            background:linear-gradient(90deg,transparent,rgba(129,140,248,.3),rgba(52,211,153,.2),transparent);border-radius:1px}

        /* Header */
        .c-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
        .c-meta{display:flex;align-items:center;gap:8px}
        .dot-live{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(52,211,153,.5);animation:pls 2s infinite}
        @keyframes pls{0%,100%{opacity:1}50%{opacity:.4}}
        .c-label{font-size:11px;color:var(--text-muted);font-weight:500;font-family:var(--mono)}
        .c-label b{color:var(--text-mid);font-weight:600}
        .c-time{font-family:var(--mono);font-size:11px;color:var(--text-dim)}

        /* Waveform */
        .wave{display:flex;align-items:center;justify-content:center;gap:1.5px;height:40px;margin-bottom:16px;cursor:pointer}
        .wave .b{width:2px;border-radius:1.5px;min-height:2px;transition:height .08s ease}
        .wave .b.past{background:var(--indigo)}
        .wave .b.future{background:rgba(255,255,255,.05)}
        .wave .b.now{background:var(--green);box-shadow:0 0 4px rgba(52,211,153,.3)}

        /* Progress */
        .prog{width:100%;height:2px;background:rgba(255,255,255,.04);border-radius:1px;margin-bottom:18px;cursor:pointer}
        .prog-fill{height:100%;border-radius:1px;background:linear-gradient(90deg,var(--indigo),var(--green));width:0%}

        /* Controls — minimal */
        .ctrls{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:16px}
        .sk{width:28px;height:28px;border-radius:50%;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-dim);transition:color .2s}
        .sk:hover{color:var(--text-muted)}
        .sk svg{width:14px;height:14px;fill:currentColor}
        .pl{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s cubic-bezier(.16,1,.3,1)}
        .pl:hover{background:rgba(255,255,255,.09);transform:scale(1.05)}
        .pl:active{transform:scale(.94)}
        .pl svg{width:18px;height:18px;fill:#fff}
        .pl.on{background:var(--indigo-glow);border-color:rgba(129,140,248,.2)}
        .pl.on svg{fill:var(--indigo-bright)}

        /* Transcript */
        .txn{display:flex;flex-direction:column;gap:8px;min-height:140px}
        .tl{opacity:0;transform:translateY(8px);transition:all .45s cubic-bezier(.16,1,.3,1);display:flex;gap:10px}
        .tl.vis{opacity:1;transform:translateY(0)}
        .tl.dim{opacity:.15}
        .tl .av{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:1px}
        .tl.ag .av{background:rgba(129,140,248,.06);color:var(--indigo);border:1px solid rgba(129,140,248,.08)}
        .tl.db .av{background:rgba(255,255,255,.02);color:var(--text-muted);border:1px solid rgba(255,255,255,.04)}
        .tl .nm{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:1px}
        .tl.ag .nm{color:rgba(129,140,248,.6)}
        .tl.db .nm{color:var(--text-dim)}
        .tl .tx{font-size:13px;line-height:1.5;color:var(--text-mid)}
        .tl.ag .tx{color:rgba(255,255,255,.85)}

        /* Outcome */
        .out{margin-top:12px;padding:8px 14px;border-radius:10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px;
            opacity:0;transform:translateY(4px);transition:all .4s cubic-bezier(.16,1,.3,1);border:1px solid transparent}
        .out.vis{opacity:1;transform:translateY(0)}
        .out.g{background:var(--green-soft);border-color:rgba(52,211,153,.08);color:var(--green)}
        .out.i{background:var(--indigo-glow);border-color:rgba(129,140,248,.08);color:var(--indigo)}

        /* Autoplay */
        .ap{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 0 0;opacity:0;transition:opacity .3s}
        .ap.vis{opacity:1}
        .ap span{font-size:10px;color:var(--text-dim)}
        .ap-bar{width:80px;height:2px;background:rgba(255,255,255,.03);border-radius:1px;overflow:hidden}
        .ap-fill{height:100%;background:var(--indigo);width:0%}

        /* ═══ PILLS ═══ */
        .pills{display:flex;gap:6px;margin-top:16px;opacity:0;animation:fi .6s .6s forwards;flex-wrap:wrap;justify-content:center}
        .pill{padding:7px 16px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:100px;font-size:11px;font-weight:600;
            color:var(--text-muted);cursor:pointer;transition:all .25s;font-family:var(--sans);white-space:nowrap}
        .pill:hover{background:rgba(255,255,255,.04);color:var(--text-mid)}
        .pill.on{background:var(--indigo-glow);border-color:rgba(129,140,248,.2);color:var(--indigo-bright)}

        /* ═══ CTA ═══ */
        .ctas{display:flex;gap:8px;margin-top:12px;opacity:0;animation:fi .6s .8s forwards}
        .cta{padding:10px 24px;background:var(--indigo-deep);color:#fff;border:none;border-radius:10px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
        .cta:hover{background:#4338ca;box-shadow:0 4px 16px rgba(79,70,229,.2)}
        .cta2{padding:10px 18px;background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:10px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;transition:all .2s}
        .cta2:hover{border-color:rgba(255,255,255,.1);color:var(--text-mid)}

        /* ═══ LOGO ═══ */
        .logo{position:absolute;top:24px;left:50%;transform:translateX(-50%);z-index:10;font-family:var(--display);font-size:13px;font-weight:800;letter-spacing:-.02em;color:rgba(255,255,255,.25);text-decoration:none;opacity:0;animation:fi .5s .15s forwards}
        .logo .d{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--indigo);margin-left:1px;vertical-align:super}

        @keyframes fi{0%{opacity:0}100%{opacity:1}}

        /* ═══ CLICK OVERLAY (autoplay workaround) ═══ */
        .click-gate{position:fixed;inset:0;z-index:100;cursor:pointer;display:flex;align-items:center;justify-content:center;background:transparent}
        .click-gate.gone{display:none}
        .click-hint{font-size:11px;color:var(--text-dim);font-weight:500;letter-spacing:.05em;text-transform:uppercase;
            padding:8px 20px;border:1px solid rgba(255,255,255,.06);border-radius:100px;backdrop-filter:blur(10px);
            animation:hint-pulse 2s infinite;position:absolute;bottom:24px}
        @keyframes hint-pulse{0%,100%{opacity:.6}50%{opacity:1}}

        /* ═══ RESPONSIVE ═══ */
        @media(max-width:640px){
            .stage{padding:0 14px}
            .typo-bg h1{font-size:clamp(60px,18vw,100px)}
            .card{padding:18px 16px 16px;border-radius:16px}
            .txn{min-height:120px}
            .tl .tx{font-size:12px}
            .pills{gap:4px}.pill{padding:6px 12px;font-size:10px}
            .ctas{flex-direction:column;width:100%;max-width:520px}
            .cta,.cta2{width:100%;justify-content:center;text-align:center}
        }
    </style>
</head>
<body>

<div class="ambient"><div class="orb a"></div><div class="orb b"></div></div>
<div class="noise"></div>

<!-- Click gate for audio autoplay -->
<div class="click-gate" id="gate">
    <div class="click-hint">Click anywhere to start</div>
</div>

<div class="stage">
    <a href="/" class="logo">AgentCollect<span class="d"></span></a>

    <div class="typo-bg"><h1>Make it<br>collect.</h1></div>

    <div class="card-wrap">
        <div class="card">
            <div class="c-head">
                <div class="c-meta"><div class="dot-live" id="dot"></div><div class="c-label" id="lbl"><b>Live call</b> &middot; Checkr</div></div>
                <div class="c-time" id="tm">0:00</div>
            </div>
            <div class="wave" id="wv"></div>
            <div class="ctrls">
                <button class="sk" id="prv"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" transform="scale(-1,1) translate(-24,0)"/></svg></button>
                <button class="pl" id="pl"><svg viewBox="0 0 24 24" id="pi"><polygon points="8,4 20,12 8,20"/></svg></button>
                <button class="sk" id="nxt"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
            </div>
            <div class="prog" id="prg"><div class="prog-fill" id="pf"></div></div>
            <div class="txn" id="txn"></div>
            <div class="out" id="ot"></div>
            <div class="ap" id="ap"><span>Next</span><div class="ap-bar"><div class="ap-fill" id="af"></div></div></div>
        </div>
    </div>

    <div class="pills" id="pills">
        <div class="pill on" data-i="0">Pays on the spot</div>
        <div class="pill" data-i="1">Handles objections</div>
        <div class="pill" data-i="2">Gets the AP contact</div>
    </div>

    <div class="ctas">
        <a href="https://cal.com/johnb/30" class="cta" target="_blank">Book a demo <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
        <a href="/" class="cta2">How it works</a>
    </div>
</div>

<script>
(function(){
    const S=[
        {id:'pays',lbl:'Checkr',url:'https://dxc03zgurdly9.cloudfront.net/10b4ec959b4a004a6bf47dcfa2da0a213c7ce231590e295d9c60faffde486685/recording.wav',
         s:35,e:52,lines:[
            {t:0,r:'a',n:'AI',x:'We represent Checkr on an outstanding invoice.'},
            {t:3,r:'d',n:'Rachel',x:"I'm paying it right now! It slipped through the cracks."},
            {t:8,r:'a',n:'AI',x:'No worries. I\u2019ll stay on the line while you complete the payment.'},
            {t:13,r:'d',n:'Rachel',x:'Payment sent.'},
            {t:15,r:'a',n:'AI',x:"We\u2019ll close your file. Thanks!"}],
         out:{x:'Paid during the call',c:'g',i:'\u2705'}},
        {id:'obj',lbl:'Checkr callback',url:'https://dxc03zgurdly9.cloudfront.net/075961824e83d68a634b91afb75f59fba97b1b2951c58dc43ec9a5e3bc58b806/recording.wav',
         s:8,e:24,lines:[
            {t:0,r:'d',n:'Khalil',x:'What are we getting charged for exactly?'},
            {t:3,r:'a',n:'AI',x:'$29.99 for a Background Check from Checkr.'},
            {t:7,r:'d',n:'Khalil',x:'Can I pay from the Checkr website?'},
            {t:10,r:'a',n:'AI',x:'Use the portal link in the email \u2014 it closes your balance.'},
            {t:14,r:'d',n:'Khalil',x:'Got it. Bye bye.'}],
         out:{x:'Objection handled \u2014 directed to portal',c:'i',i:'\ud83d\udccb'}},
        {id:'ref',lbl:'CalOES',url:'https://dxc03zgurdly9.cloudfront.net/00d79b2208aee99e88fb7a0033974bba3140f3b905b388429b22133e4694c670/recording.wav',
         s:56,e:74,lines:[
            {t:0,r:'d',n:'Employee',x:"I don't deal with that. Call accounts payable."},
            {t:4,r:'a',n:'AI',x:'Could you give me the AP contact info?'},
            {t:8,r:'d',n:'Employee',x:'One sec\u2026 916-845-8340.'},
            {t:12,r:'a',n:'AI',x:"Thanks. And their email?"},
            {t:15,r:'d',n:'Employee',x:'ap-invoices@caloes.ca.gov.'},
            {t:17,r:'a',n:'AI',x:"Got it. We\u2019ll reach out to AP."}],
         out:{x:'AP contact collected from gatekeeper',c:'i',i:'\ud83d\udcde'}}
    ];

    let ci=0,au=null,playing=false,atm=null,bars=[],wf=null;
    const $=id=>document.getElementById(id);
    const pl=$('pl'),pi=$('pi'),lbl=$('lbl'),tm=$('tm'),pf=$('pf'),prg=$('prg');
    const txn=$('txn'),ot=$('ot'),ap=$('ap'),af=$('af'),wv=$('wv');
    const pills=document.querySelectorAll('.pill');

    // Waveform
    function mkWave(){wv.innerHTML='';bars=[];for(let i=0;i<100;i++){const b=document.createElement('div');b.className='b future';const c=50,d=Math.abs(i-c)/c;const h=Math.max(2,(1-d*.7)*28+Math.sin(i*.65)*6+Math.random()*4);b.style.height=h+'px';b._h=h;wv.appendChild(b);bars.push(b)}}
    function animW(){if(!playing)return;const s=S[ci],el=au?au.currentTime-s.s:0,dur=s.e-s.s,p=dur>0?el/dur:0,ai=Math.floor(p*bars.length);
        bars.forEach((b,i)=>{if(i<ai){b.className='b past';b.style.height=b._h+'px'}else if(i===ai){b.className='b now';b.style.height=(b._h+Math.random()*10)+'px'}else{b.className='b future';b.style.height=b._h+'px'}});
        wf=requestAnimationFrame(animW)}
    function rstW(){cancelAnimationFrame(wf);bars.forEach(b=>{b.className='b future';b.style.height=b._h+'px'})}

    // Transcript
    function mkTx(s){txn.innerHTML='';s.lines.forEach(l=>{const d=document.createElement('div');d.className='tl '+(l.r==='a'?'ag':'db');d.dataset.t=l.t;
        d.innerHTML='<div class="av">'+(l.r==='a'?'AI':l.n[0])+'</div><div><div class="nm">'+(l.r==='a'?'AI Agent':l.n)+'</div><div class="tx">\u201C'+l.x+'\u201D</div></div>';txn.appendChild(d)})}
    function upTx(el){const ls=txn.querySelectorAll('.tl');let last=-1;ls.forEach((l,i)=>{if(el>=+l.dataset.t){l.classList.add('vis');l.classList.remove('dim');last=i}else l.classList.remove('vis')});
        ls.forEach((l,i)=>{if(i<last-1&&l.classList.contains('vis'))l.classList.add('dim')})}

    function fmt(s){if(isNaN(s)||s<0)s=0;return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0')}

    function load(idx,auto){
        if(au){au.pause();au.ontimeupdate=null;au=null}playing=false;clrAp();cancelAnimationFrame(wf);
        ci=idx;const s=S[idx];
        pills.forEach((p,i)=>p.classList.toggle('on',i===idx));
        lbl.innerHTML='<b>Live call</b> &middot; '+s.lbl;
        tm.textContent=fmt(s.e-s.s);pf.style.width='0%';
        mkTx(s);ot.className='out';ot.innerHTML='';rstW();
        pl.classList.remove('on');pi.innerHTML='<polygon points="8,4 20,12 8,20"/>';
        if(auto)setTimeout(()=>go(),200);
    }

    function go(){
        const s=S[ci];clrAp();
        if(!au){
            au=new Audio(s.url);au.preload='auto';au.currentTime=s.s;
            au.ontimeupdate=function(){
                const el=au.currentTime-s.s,dur=s.e-s.s;if(el<0)return;
                if(au.currentTime>=s.e){au.pause();playing=false;onEnd();return}
                pf.style.width=Math.min(el/dur*100,100)+'%';
                tm.textContent=fmt(el);upTx(el);
            };
        }
        au.play();playing=true;pl.classList.add('on');
        pi.innerHTML='<rect x="7" y="5" width="3.5" height="14" rx="1"/><rect x="13.5" y="5" width="3.5" height="14" rx="1"/>';
        animW();
    }

    function stop(){if(au)au.pause();playing=false;pl.classList.remove('on');pi.innerHTML='<polygon points="8,4 20,12 8,20"/>';cancelAnimationFrame(wf)}
    function tog(){playing?stop():go()}

    function onEnd(){
        const s=S[ci];pl.classList.remove('on');pi.innerHTML='<polygon points="8,4 20,12 8,20"/>';cancelAnimationFrame(wf);
        txn.querySelectorAll('.tl').forEach(l=>{l.classList.add('vis');l.classList.remove('dim')});
        ot.className='out '+s.out.c;ot.innerHTML='<span>'+s.out.i+'</span> '+s.out.x;
        setTimeout(()=>ot.classList.add('vis'),60);pf.style.width='100%';
        startAp();
    }

    const DLY=2500;
    function startAp(){ap.classList.add('vis');af.style.transition='none';af.style.width='0%';
        requestAnimationFrame(()=>{af.style.transition='width '+DLY+'ms linear';af.style.width='100%'});
        atm=setTimeout(()=>{ap.classList.remove('vis');load((ci+1)%S.length,true)},DLY)}
    function clrAp(){clearTimeout(atm);ap.classList.remove('vis');af.style.width='0%'}

    prg.addEventListener('click',e=>{if(!au)return;const s=S[ci],r=prg.getBoundingClientRect();au.currentTime=s.s+Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*(s.e-s.s)});
    wv.addEventListener('click',e=>{if(!au)go();const s=S[ci],r=wv.getBoundingClientRect();au.currentTime=s.s+Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*(s.e-s.s)});

    pl.addEventListener('click',tog);
    pills.forEach(p=>p.addEventListener('click',()=>load(+p.dataset.i,true)));
    $('prv').addEventListener('click',()=>load((ci-1+S.length)%S.length,true));
    $('nxt').addEventListener('click',()=>load((ci+1)%S.length,true));
    document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();tog()}if(e.code==='ArrowRight')$('nxt').click();if(e.code==='ArrowLeft')$('prv').click()});

    // Click gate — browsers block autoplay without user gesture
    const gate=$('gate');
    gate.addEventListener('click',()=>{gate.classList.add('gone');go()});

    mkWave();load(0,false);
    // Show first line as preview
    setTimeout(()=>{const fl=txn.querySelector('.tl');if(fl)fl.classList.add('vis')},800);
})();
</script>
</body>
</html>
