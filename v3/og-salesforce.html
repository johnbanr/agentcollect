<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;overflow:hidden;font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#f6f3ef;color:#0B1B3D;position:relative;display:flex;align-items:center;justify-content:center}

/* Halo */
.glow{position:absolute;width:600px;height:600px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(79,70,229,.08) 0%,transparent 60%);border-radius:50%}

.content{position:relative;z-index:1;text-align:center;max-width:900px}

/* Salesforce logo */
.sf-logo{height:72px;opacity:.8;margin-bottom:36px}

/* The number */
.num{font-size:200px;font-weight:900;letter-spacing:-.06em;line-height:.85;color:#dc2626;margin-bottom:12px}

/* The line */
.line{font-size:38px;font-weight:800;letter-spacing:-.02em;color:#0B1B3D;line-height:1.3}
.line .muted{color:#6b7280;font-weight:600}

/* Brand */
.brand{position:absolute;bottom:36px;left:72px;font-size:22px;font-weight:900;letter-spacing:-.4px;color:#0B1B3D;opacity:.6}
.brand .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4F46E5;margin-left:2px}

.sources{position:absolute;bottom:40px;right:72px;font-size:16px;color:#6b7280;font-weight:600}
</style>
    <!-- RB2B -->
    <script>!function(key) {if (window.reb2b) return;window.reb2b = {loaded: true};var s = document.createElement("script");s.async = true;s.src = "https://ddwl4m2hdecbv.cloudfront.net/b/" + key + "/" + key + ".js.gz";document.getElementsByTagName("script")[0].parentNode.insertBefore(s, document.getElementsByTagName("script")[0]);}("LNKLDHEDW9OJ");</script>
</head>
<body>

<div class="glow"></div>

<div class="content">
  <img src="https://cdn.brandfetch.io/salesforce.com/w/256/h/48/logo" alt="Salesforce" class="sf-logo" crossorigin="anonymous">
  <div class="num">298</div>
  <div class="line">billing complaints <span class="muted">from your customers.</span></div>
</div>

<div class="brand">AgentCollect<span class="dot"></span></div>
<div class="sources">BBB · Trustpilot · G2</div>

</body></html>
