<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  background: #ffffff;
  font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
  display: flex;
  align-items: center;
  overflow: hidden;
  position: relative;
}

/* Subtle background texture */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 20% 50%, rgba(37, 99, 235, 0.03) 0%, transparent 50%),
              radial-gradient(circle at 80% 80%, rgba(239, 68, 68, 0.02) 0%, transparent 40%);
}

.layout {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  width: 100%;
  height: 100%;
  padding: 0 80px;
  gap: 60px;
}

/* The "a" icon with red slash */
.icon-container {
  flex-shrink: 0;
  position: relative;
  width: 200px;
  height: 200px;
}

.icon-bg {
  width: 200px;
  height: 200px;
  background: #f8fafc;
  border: 3px solid #e2e8f0;
  border-radius: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.icon-letter {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 120px;
  font-weight: 900;
  color: #1e293b;
  line-height: 1;
  position: relative;
  z-index: 1;
}

/* Red diagonal slash — like Salesforce "No Software" */
.red-slash {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 240px;
  height: 8px;
  background: #ef4444;
  border-radius: 4px;
  transform: translate(-50%, -50%) rotate(-45deg);
  z-index: 2;
  box-shadow: 0 2px 8px rgba(239, 68, 68, 0.3);
}

/* Right side content */
.content {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.wordmark {
  font-size: 56px;
  font-weight: 900;
  letter-spacing: -0.03em;
  line-height: 1;
}

.wordmark .agent {
  color: #1e293b;
}

.wordmark .collect {
  color: #2563eb;
}

.tagline {
  font-size: 36px;
  font-weight: 800;
  color: #1e293b;
  letter-spacing: -0.02em;
  line-height: 1.2;
}

.tagline .not {
  color: #ef4444;
  text-decoration: line-through;
  text-decoration-color: #ef4444;
  text-decoration-thickness: 3px;
}

.description {
  font-size: 22px;
  font-weight: 500;
  color: #64748b;
  line-height: 1.5;
  max-width: 560px;
}

/* Bottom border accent */
.bottom-accent {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: linear-gradient(90deg, #2563eb 0%, #2563eb 70%, #ef4444 70%, #ef4444 100%);
}
</style>

</head>
<body>
<div class="layout">
  <div class="icon-container">
    <div class="icon-bg">
      <span class="icon-letter">a</span>
      <div class="red-slash"></div>
    </div>
  </div>
  <div class="content">
    <div class="wordmark">
      <span class="agent">agent</span><span class="collect">collect</span>
    </div>
    <div class="tagline">Agents, Not <span class="not">Agencies</span>.</div>
    <div class="description">AI agents that call, email, and negotiate — under your brand.</div>
  </div>
</div>
<div class="bottom-accent"></div>
</body>
</html>
