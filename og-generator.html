<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;background:linear-gradient(135deg,#faf8f5 0%,#f0ebe4 100%);font-family:'Plus Jakarta Sans',-apple-system,sans-serif;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;overflow:hidden}
.glow{position:absolute;width:600px;height:600px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(108,71,255,.08) 0%,transparent 60%);border-radius:50%}
.content{position:relative;z-index:1;text-align:center;padding:0 80px}
.logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:40px}
.logo-mark{width:48px;height:48px;background:linear-gradient(135deg,#6c47ff,#a78bfa);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:800}
.logo-text{font-size:28px;font-weight:800;color:#1a1a2e;letter-spacing:-.03em}
.logo-text span{color:#6c47ff}
h1{font-size:52px;font-weight:800;letter-spacing:-.04em;line-height:1.12;color:#1a1a2e;margin-bottom:20px}
h1 em{font-style:normal;color:#6c47ff}
p{font-size:22px;color:rgba(26,26,46,.55);line-height:1.5;margin-bottom:32px}
.badges{display:flex;gap:12px;justify-content:center}
.badge{padding:8px 16px;background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:100px;font-size:14px;font-weight:600;color:#1a1a2e}
.badge.brand{background:rgba(108,71,255,.08);color:#6c47ff;border-color:rgba(108,71,255,.15)}
</style>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="glow"></div>
<div class="content">
    <div class="logo">
        <div class="logo-mark">AC</div>
        <div class="logo-text">agent<span>collect</span></div>
    </div>
    <h1>AI agents that collect<br>your <em>unpaid invoices</em></h1>
    <p>~50% recovery rate in 20 days. Fortune 500 trusted.</p>
    <div class="badges">
        <div class="badge brand">Try the $1 live demo</div>
        <div class="badge">SOC 2 Type II</div>
        <div class="badge">85K calls/day</div>
    </div>
</div>
</body>
</html>
