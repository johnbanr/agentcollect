<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentCollect — Call Transcript</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  color: #e0e0e0;
  font-family: 'JetBrains Mono', monospace;
  height: 100vh;
  overflow: hidden;
  position: relative;
}

/* Scanline effect */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 255, 0, 0.015) 2px,
    rgba(0, 255, 0, 0.015) 4px
  );
  pointer-events: none;
  z-index: 1000;
  animation: scanMove 8s linear infinite;
}

@keyframes scanMove {
  0% { transform: translateY(0); }
  100% { transform: translateY(4px); }
}

/* Scanline sweep */
body::before {
  content: '';
  position: fixed;
  top: -100%;
  left: 0;
  right: 0;
  height: 100%;
  background: linear-gradient(
    180deg,
    transparent 0%,
    rgba(0, 255, 0, 0.03) 50%,
    transparent 100%
  );
  pointer-events: none;
  z-index: 999;
  animation: scanSweep 6s linear infinite;
}

@keyframes scanSweep {
  0% { top: -100%; }
  100% { top: 100%; }
}

.logo {
  position: fixed;
  top: 20px;
  left: 24px;
  z-index: 100;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 900;
  font-size: 16px;
  color: #6366f1;
  opacity: 0.5;
  letter-spacing: -0.02em;
}

.logo-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: #6366f1;
  border-radius: 50%;
  margin-left: 1px;
  vertical-align: super;
  position: relative;
  top: -4px;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 60px 20px 20px;
}

/* Terminal chrome */
.terminal {
  flex: 1;
  display: flex;
  flex-direction: column;
  border: 1px solid #1a1a1a;
  border-radius: 8px;
  overflow: hidden;
  background: #0d0d0d;
}

.terminal-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: #141414;
  border-bottom: 1px solid #1a1a1a;
  flex-shrink: 0;
}

.terminal-dots {
  display: flex;
  gap: 6px;
}

.terminal-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.terminal-dot.red { background: #ff5f57; }
.terminal-dot.yellow { background: #febc2e; }
.terminal-dot.green { background: #28c840; }

.terminal-title {
  flex: 1;
  text-align: center;
  font-size: 11px;
  color: #555;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* Transcript area */
.transcript-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  scroll-behavior: smooth;
}

.transcript-area::-webkit-scrollbar { width: 4px; }
.transcript-area::-webkit-scrollbar-track { background: transparent; }
.transcript-area::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

.line {
  margin-bottom: 12px;
  line-height: 1.6;
  font-size: 13px;
}

.line .timestamp {
  color: #444;
  margin-right: 8px;
}

.line .speaker-debtor {
  color: #ffffff;
  font-weight: 700;
}

.line .speaker-agent {
  color: #818cf8;
  font-weight: 700;
}

.line .text {
  color: #ccc;
}

.line.result-line {
  margin-top: 20px;
  padding: 10px 0;
  border-top: 1px solid #1a1a1a;
}

.line.result-line .result-prefix {
  color: #22c55e;
  font-weight: 700;
}

.line.result-line .result-text {
  color: #22c55e;
}

.line.pause-line .text {
  color: #333;
  font-style: italic;
}

.cursor-blink {
  display: inline-block;
  width: 8px;
  height: 15px;
  background: #818cf8;
  animation: blink 1s step-end infinite;
  vertical-align: text-bottom;
  margin-left: 2px;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* Audio bar */
.audio-bar {
  flex-shrink: 0;
  border-top: 1px solid #1a1a1a;
  padding: 12px 16px;
  background: #0d0d0d;
}

.waveform-container {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}

.play-btn {
  background: none;
  border: 1px solid #333;
  color: #818cf8;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 4px 10px;
  cursor: pointer;
  border-radius: 3px;
  white-space: nowrap;
  transition: border-color 0.2s;
}

.play-btn:hover {
  border-color: #818cf8;
}

.waveform {
  flex: 1;
  height: 24px;
  display: flex;
  align-items: center;
  gap: 2px;
  overflow: hidden;
}

.waveform-bar {
  width: 2px;
  background: #222;
  border-radius: 1px;
  transition: height 0.1s, background 0.1s;
  flex-shrink: 0;
}

.waveform-bar.active {
  background: #818cf8;
}

.time-display {
  font-size: 11px;
  color: #444;
  white-space: nowrap;
}

/* Controls */
.controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  padding: 10px 16px;
  border-top: 1px solid #1a1a1a;
  background: #0d0d0d;
}

.scene-switcher {
  display: flex;
  gap: 4px;
}

.scene-btn {
  background: none;
  border: 1px solid #222;
  color: #555;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 3px 10px;
  cursor: pointer;
  border-radius: 3px;
  transition: all 0.2s;
}

.scene-btn:hover {
  border-color: #444;
  color: #888;
}

.scene-btn.active {
  border-color: #818cf8;
  color: #818cf8;
}

.status-line {
  font-size: 11px;
  color: #333;
  letter-spacing: 0.05em;
}

.status-line .recording-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: #ef4444;
  border-radius: 50%;
  margin-right: 6px;
  animation: blink 2s ease-in-out infinite;
}

/* Mobile */
@media (max-width: 600px) {
  .container { padding: 50px 10px 10px; }
  .terminal-title { font-size: 9px; }
  .line { font-size: 12px; }
  .status-line { font-size: 9px; }
  .logo { top: 14px; left: 14px; font-size: 14px; }
  .controls { flex-direction: column; gap: 8px; align-items: flex-start; }
}
</style>
</head>
<body>

<div class="logo">AgentCollect<span class="logo-dot"></span></div>

<div class="container">
  <div class="terminal">
    <div class="terminal-header">
      <div class="terminal-dots">
        <div class="terminal-dot red"></div>
        <div class="terminal-dot yellow"></div>
        <div class="terminal-dot green"></div>
      </div>
      <div class="terminal-title">CALL RECORDING — TRANSCRIPT</div>
    </div>

    <div class="transcript-area" id="transcript"></div>

    <div class="audio-bar">
      <div class="waveform-container">
        <button class="play-btn" id="playBtn">[▶ PLAY]</button>
        <div class="waveform" id="waveform"></div>
        <span class="time-display" id="timeDisplay">00:00</span>
      </div>
    </div>

    <div class="controls">
      <div class="scene-switcher">
        <button class="scene-btn active" data-scene="0">[1]</button>
        <button class="scene-btn" data-scene="1">[2]</button>
        <button class="scene-btn" data-scene="2">[3]</button>
      </div>
      <div class="status-line" id="statusLine">
        <span class="recording-dot"></span>RECORDING 00:00 | SCENE 1/3 | [CLIENT] → KHALIL
      </div>
    </div>
  </div>
</div>

<script>
const scenes = [
  {
    url: 'https://dxc03zgurdly9.cloudfront.net/075961824e83d68a634b91afb75f59fba97b1b2951c58dc43ec9a5e3bc58b806/recording.wav',
    audioStart: 30,
    name: '[CLIENT] → KHALIL',
    duration: '03:24',
    beats: [
      { delay: 500, type: 'debtor', time: '00:31', text: 'I guess I do have questions about it.' },
      { delay: 2700, type: 'debtor', time: '00:33', text: 'What are we getting charged for exactly?' },
      { delay: 5000, type: 'pause', time: '00:35', text: '...' },
      { delay: 5800, type: 'agent', time: '00:36', text: 'Twenty-nine ninety-nine. Background check from [Client].' },
      { delay: 10000, type: 'result', text: '>>> RESULT: Objection handled. Directed to portal.' }
    ]
  },
  {
    url: 'https://dxc03zgurdly9.cloudfront.net/00d79b2208aee99e88fb7a0033974bba3140f3b905b388429b22133e4694c670/recording.wav',
    audioStart: 56,
    name: '[CLIENT] → JONATHAN',
    duration: '02:18',
    beats: [
      { delay: 200, type: 'debtor', time: '00:56', text: "I don't deal with that." },
      { delay: 1800, type: 'debtor', time: '00:58', text: "You'd wanna call accounts payable." },
      { delay: 5000, type: 'pause', time: '01:01', text: '...' },
      { delay: 6000, type: 'agent', time: '01:02', text: 'Could you provide the name or contact info for AP?' },
      { delay: 9500, type: 'result', text: '>>> RESULT: AP contact collected. Phone + email.' }
    ]
  },
  {
    url: 'https://dxc03zgurdly9.cloudfront.net/10b4ec959b4a004a6bf47dcfa2da0a213c7ce231590e295d9c60faffde486685/recording.wav',
    audioStart: 50,
    name: '[CLIENT] → RACHEL',
    duration: '04:12',
    beats: [
      { delay: 1800, type: 'debtor', time: '00:52', text: "I'm paying it today. I have it coming in." },
      { delay: 5200, type: 'pause', time: '00:55', text: '...' },
      { delay: 5700, type: 'debtor', time: '00:56', text: 'I, again, am so sorry.' },
      { delay: 8500, type: 'pause', time: '00:59', text: '...' },
      { delay: 9000, type: 'debtor', time: '00:59', text: 'It is being paid, honestly. I\'m in front of my computer putting it in right now.' },
      { delay: 13000, type: 'result', text: '>>> RESULT: Paid during the call. $0 manual work.' }
    ]
  }
];

let currentScene = 0;
let audio = null;
let isPlaying = false;
let beatTimeouts = [];
let typingInterval = null;
let waveformBars = [];
let waveformRAF = null;
let audioContext = null;
let analyser = null;
let sourceNode = null;

const transcript = document.getElementById('transcript');
const playBtn = document.getElementById('playBtn');
const waveform = document.getElementById('waveform');
const timeDisplay = document.getElementById('timeDisplay');
const statusLine = document.getElementById('statusLine');
const sceneBtns = document.querySelectorAll('.scene-btn');

// Init waveform bars
function initWaveform() {
  waveform.innerHTML = '';
  waveformBars = [];
  const count = Math.floor(waveform.offsetWidth / 4) || 100;
  for (let i = 0; i < count; i++) {
    const bar = document.createElement('div');
    bar.className = 'waveform-bar';
    bar.style.height = '2px';
    waveform.appendChild(bar);
    waveformBars.push(bar);
  }
}

function animateWaveform() {
  if (!analyser || !isPlaying) {
    waveformBars.forEach(b => { b.style.height = '2px'; b.classList.remove('active'); });
    return;
  }
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  const step = Math.floor(data.length / waveformBars.length);
  for (let i = 0; i < waveformBars.length; i++) {
    const val = data[i * step] || 0;
    const h = Math.max(2, (val / 255) * 22);
    waveformBars[i].style.height = h + 'px';
    waveformBars[i].classList.toggle('active', val > 30);
  }
  waveformRAF = requestAnimationFrame(animateWaveform);
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

function updateTime() {
  if (!audio) return;
  const elapsed = audio.currentTime - scenes[currentScene].audioStart;
  timeDisplay.textContent = formatTime(Math.max(0, elapsed));
  statusLine.innerHTML = `<span class="recording-dot"></span>RECORDING ${formatTime(Math.max(0, elapsed))} | SCENE ${currentScene + 1}/3 | ${scenes[currentScene].name}`;
  if (isPlaying) requestAnimationFrame(updateTime);
}

function typeText(container, text, charDelay, callback) {
  let i = 0;
  const cursor = document.createElement('span');
  cursor.className = 'cursor-blink';
  container.appendChild(cursor);

  typingInterval = setInterval(() => {
    if (i < text.length) {
      cursor.before(document.createTextNode(text[i]));
      i++;
      transcript.scrollTop = transcript.scrollHeight;
    } else {
      clearInterval(typingInterval);
      typingInterval = null;
      cursor.remove();
      if (callback) callback();
    }
  }, charDelay);
}

function addLine(beat) {
  const line = document.createElement('div');
  line.className = 'line' + (beat.type === 'result' ? ' result-line' : '') + (beat.type === 'pause' ? ' pause-line' : '');

  if (beat.type === 'result') {
    const prefix = document.createElement('span');
    prefix.className = 'result-prefix';
    const textSpan = document.createElement('span');
    textSpan.className = 'result-text';
    line.appendChild(prefix);
    line.appendChild(textSpan);
    transcript.appendChild(line);
    typeText(prefix, '>>> RESULT: ', 25, () => {
      const resultMsg = beat.text.replace('>>> RESULT: ', '');
      typeText(textSpan, resultMsg, 25);
    });
  } else if (beat.type === 'pause') {
    const ts = document.createElement('span');
    ts.className = 'timestamp';
    ts.textContent = `[${beat.time}]`;
    const textSpan = document.createElement('span');
    textSpan.className = 'text';
    textSpan.textContent = '...';
    line.appendChild(ts);
    line.appendChild(textSpan);
    transcript.appendChild(line);
  } else {
    const ts = document.createElement('span');
    ts.className = 'timestamp';
    ts.textContent = `[${beat.time}]`;
    const speaker = document.createElement('span');
    speaker.className = beat.type === 'agent' ? 'speaker-agent' : 'speaker-debtor';
    speaker.textContent = beat.type === 'agent' ? ' [AI AGENT] ' : ' [DEBTOR] ';
    const textSpan = document.createElement('span');
    textSpan.className = 'text';
    line.appendChild(ts);
    line.appendChild(speaker);
    line.appendChild(textSpan);
    transcript.appendChild(line);
    typeText(textSpan, `"${beat.text}"`, 30);
  }

  transcript.scrollTop = transcript.scrollHeight;
}

function clearBeats() {
  beatTimeouts.forEach(t => clearTimeout(t));
  beatTimeouts = [];
  if (typingInterval) { clearInterval(typingInterval); typingInterval = null; }
}

function startBeats() {
  clearBeats();
  transcript.innerHTML = '';
  const scene = scenes[currentScene];
  scene.beats.forEach(beat => {
    const t = setTimeout(() => addLine(beat), beat.delay);
    beatTimeouts.push(t);
  });
}

function stopAudio() {
  clearBeats();
  if (waveformRAF) cancelAnimationFrame(waveformRAF);
  if (audio) { audio.pause(); audio.removeEventListener('playing', onAudioPlaying); }
  isPlaying = false;
  playBtn.textContent = '[▶ PLAY]';
  waveformBars.forEach(b => { b.style.height = '2px'; b.classList.remove('active'); });
}

function onAudioPlaying() {
  startBeats();
  animateWaveform();
  updateTime();
}

function play() {
  const scene = scenes[currentScene];

  if (audio && isPlaying) {
    stopAudio();
    return;
  }

  stopAudio();
  transcript.innerHTML = '';

  audio = new Audio(scene.url);
  audio.crossOrigin = 'anonymous';
  audio.currentTime = scene.audioStart;

  // Set up Web Audio API for waveform
  try {
    if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
    if (sourceNode) { try { sourceNode.disconnect(); } catch(e) {} }
    sourceNode = audioContext.createMediaElementSource(audio);
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;
    sourceNode.connect(analyser);
    analyser.connect(audioContext.destination);
  } catch(e) {
    // Fallback: just play without waveform
    audio.play();
  }

  audio.addEventListener('playing', onAudioPlaying);
  audio.addEventListener('ended', () => stopAudio());

  audio.play().then(() => {
    isPlaying = true;
    playBtn.textContent = '[⏸ PAUSE]';
  }).catch(() => {});
}

function switchScene(idx) {
  if (idx === currentScene && !isPlaying) {
    // Just reset display
  } else {
    stopAudio();
    // Disconnect old source to avoid re-use error
    if (sourceNode) { try { sourceNode.disconnect(); } catch(e) {} sourceNode = null; }
    if (audio) { audio = null; }
    currentScene = idx;
  }
  sceneBtns.forEach((b, i) => b.classList.toggle('active', i === idx));
  transcript.innerHTML = '';
  timeDisplay.textContent = '00:00';
  const scene = scenes[idx];
  statusLine.innerHTML = `<span class="recording-dot"></span>RECORDING 00:00 | SCENE ${idx + 1}/3 | ${scene.name}`;
}

// Events
playBtn.addEventListener('click', play);
sceneBtns.forEach(btn => {
  btn.addEventListener('click', () => switchScene(parseInt(btn.dataset.scene)));
});

// Init
initWaveform();
window.addEventListener('resize', initWaveform);
switchScene(0);
</script>
</body>
</html>
