<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OG — Financing in the Rear-View Mirror</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800;900&family=Inter:wght@500;600;700&family=Fraunces:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden;background:#fff}
.og{width:1200px;height:630px;background:linear-gradient(135deg,#2E2268 0%,#433196 55%,#5B45C2 100%);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:72px;color:#fff;font-family:'Inter',sans-serif}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:80px 80px;pointer-events:none}
.eyebrow{font-family:'Inter',sans-serif;font-size:14px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:#fff;opacity:.7;margin-bottom:10px;position:relative}
.eyebrow::after{content:'';display:block;width:70px;height:1.5px;background:rgba(255,255,255,.7);margin-top:14px}
.quote-big{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:92px;line-height:1.02;letter-spacing:-.025em;margin-top:38px;position:relative;max-width:950px}
.quote-big::before{content:'\201C';display:inline-block;font-size:200px;line-height:.5;color:rgba(255,255,255,.22);position:absolute;left:-90px;top:30px;font-family:'Fraunces',serif}
.attribution{display:flex;align-items:center;gap:16px;margin-top:44px;font-family:'Inter',sans-serif}
.attribution::before{content:'';width:40px;height:1.5px;background:rgba(255,255,255,.6);display:block}
.attribution-text{font-size:17px;color:rgba(255,255,255,.88);font-weight:500;letter-spacing:.04em}
.footer{position:absolute;bottom:56px;left:72px;right:72px;display:flex;justify-content:space-between;align-items:flex-end;font-size:12px;color:rgba(255,255,255,.5);letter-spacing:.18em;text-transform:uppercase;font-weight:600}
.brand{position:absolute;top:72px;right:72px;display:flex;align-items:center;gap:8px}
.brand-badge{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;font-weight:900;font-size:18px;color:#fff;position:relative}
.brand-badge::after{content:'';position:absolute;top:6px;right:-2px;width:7px;height:7px;background:#fff;border-radius:50%}
.brand-name{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:16px;color:#fff;letter-spacing:-.02em}
.title-bar{position:absolute;bottom:130px;left:72px;font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:600;color:#fff;opacity:.85;line-height:1.3;max-width:900px}
</style>
</head>
<body>
<div class="og">
    <div class="grid"></div>
    <div class="brand">
        <div class="brand-badge">A</div>
        <div class="brand-name">AgentCollect.</div>
    </div>
    <div class="eyebrow">Essay · Capital Allocation</div>
    <div class="quote-big">financing in the rear-view mirror.</div>
    <div class="attribution"><div class="attribution-text">Michael Milken, circa 1969</div></div>
    <div class="title-bar">A 55-year argument about capital allocation — and the asset class still making the same mistake.</div>
    <div class="footer">
        <div>AGENTCOLLECT.COM · ESSAY</div>
        <div>READ · 14 MIN</div>
    </div>
</div>
</body>
</html>
